<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="shared/gtm.js"></script>
<title>Giochi</title>
<link rel="stylesheet" href="styles/base.css" />
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KSS8BN6Q" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <div id="app-header"></div>
  <div class="subtitle" data-i18n="menu.pickAGame">Scegli un gioco</div>
  <div class="game-grid" id="game-grid"></div>
  <div id="app-footer"></div>
  <script type="module">
    import { applyLanguage, currentLang, T, onLanguageChange } from './shared/i18n.js';
    import { renderHeader } from './shared/header.js';
    import { renderFooter } from './shared/footer.js';
    import { changeBackground } from './shared/backgrounds.js';
    import { GAMES } from './shared/registry.js';

    const grid = document.getElementById('game-grid');

    function renderCards() {
      grid.innerHTML = '';
      const tabs = T().tabs;
      for (const g of GAMES) {
        const a = document.createElement('a');
        a.className = 'game-card';
        a.href = `games/${g.slug}/`;
        a.innerHTML = `<span class="emoji">${g.emoji}</span><span class="label">${tabs[g.i18nTab]}</span>`;
        grid.appendChild(a);
      }
    }

    renderHeader({ showLangSelect: true });
    renderFooter();
    renderCards();
    onLanguageChange(renderCards);
    applyLanguage(currentLang);
    changeBackground();
  </script>
</body>
</html>
