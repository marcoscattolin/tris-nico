<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giochi</title>
<link rel="stylesheet" href="styles/base.css" />
<script src="shared/analytics.js"></script>
</head>
<body>
  <div id="app-header"></div>
  <div class="subtitle" data-i18n="menu.pickAGame">Scegli un gioco</div>
  <div class="game-grid" id="game-grid"></div>
  <script type="module">
    import { applyLanguage, currentLang, T, onLanguageChange } from './shared/i18n.js';
    import { renderHeader } from './shared/header.js';
    import { changeBackground } from './shared/backgrounds.js';
    import { GAMES } from './shared/registry.js';

    const grid = document.getElementById('game-grid');

    function renderCards() {
      grid.innerHTML = '';
      const tabs = T().tabs;
      for (const g of GAMES) {
        const a = document.createElement('a');
        a.className = 'game-card';
        a.href = `games/${g.slug}/`;
        a.innerHTML = `<span class="emoji">${g.emoji}</span><span class="label">${tabs[g.i18nTab]}</span>`;
        grid.appendChild(a);
      }
    }

    renderHeader({ showLangSelect: true });
    renderCards();
    onLanguageChange(renderCards);
    applyLanguage(currentLang);
    changeBackground();
  </script>
</body>
</html>
