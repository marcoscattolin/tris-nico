<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giochi</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --cell: #334155;
    --cell-hover: #475569;
    --x-color: #38bdf8;
    --o-color: #fb7185;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #fbbf24;
    --win: #22c55e;
    --lose: #ef4444;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    transition: background 0.6s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
    min-height: 100vh;
  }

  h1 {
    margin: 0 0 12px;
    font-size: clamp(28px, 6vw, 40px);
    letter-spacing: 1px;
    text-align: center;
  }

  .subtitle {
    color: var(--muted);
    margin-bottom: 16px;
    font-size: 14px;
    text-align: center;
  }

  .lang-menu {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    background: rgba(0,0,0,0.25);
    padding: 8px 14px;
    border-radius: 12px;
  }

  .lang-menu label {
    font-size: 13px;
    color: var(--muted);
  }

  .lang-menu select {
    background: var(--cell);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
  }

  .game-menu {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
    background: rgba(0,0,0,0.25);
    padding: 6px;
    border-radius: 14px;
    justify-content: center;
  }

  .game-tab {
    background: transparent;
    color: var(--text);
    border: none;
    padding: 9px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    transition: background 0.15s;
  }

  .game-tab:hover { background: rgba(255,255,255,0.08); }
  .game-tab.active {
    background: var(--cell);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .game-view.hidden { display: none; }
  .game-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .panel {
    background: var(--panel);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    width: min(440px, 100%);
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    justify-content: center;
  }

  .controls button {
    background: var(--cell);
    color: var(--text);
    border: 2px solid transparent;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s;
  }

  .controls button:hover { background: var(--cell-hover); }
  .controls button.active {
    border-color: var(--accent);
    background: var(--cell-hover);
  }

  .status {
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    min-height: 28px;
    margin-bottom: 16px;
  }

  .status.win { color: var(--win); }
  .status.lose { color: var(--lose); }
  .status.draw { color: var(--accent); }

  /* -------- Tris -------- */

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
    aspect-ratio: 1 / 1;
    margin-bottom: 16px;
  }

  .cell {
    background: var(--cell);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: clamp(40px, 12vw, 64px);
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.15s;
    font-family: inherit;
    min-width: 0;
    min-height: 0;
    width: 100%;
    height: 100%;
  }

  .cell:not(:disabled):hover {
    background: var(--cell-hover);
    transform: scale(1.03);
  }

  .cell:disabled { cursor: default; }
  .cell.x { color: var(--x-color); }
  .cell.o { color: var(--o-color); }

  .cell.win-line {
    background: rgba(34, 197, 94, 0.25);
    animation: pulse 0.8s ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    text-align: center;
    font-size: 14px;
  }

  .score-item {
    background: var(--cell);
    padding: 10px 6px;
    border-radius: 10px;
  }

  .score-item .label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .score-item .value {
    font-size: 22px;
    font-weight: 700;
    margin-top: 2px;
  }

  .score-item.you .value { color: var(--x-color); }
  .score-item.ai .value { color: var(--o-color); }
  .score-item.draws .value { color: var(--accent); }

  /* -------- Impiccato -------- */

  .hangman-svg {
    display: block;
    margin: 0 auto 12px;
    width: 180px;
    height: 220px;
  }
  .hangman-svg line, .hangman-svg circle {
    stroke: var(--text);
    stroke-width: 4;
    stroke-linecap: round;
    fill: none;
  }
  .hangman-svg .part {
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .hangman-svg .part.shown { opacity: 1; }

  .word-display {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 700;
    letter-spacing: 1px;
  }

  .letter-slot {
    min-width: 22px;
    text-align: center;
    border-bottom: 3px solid var(--cell);
    padding: 2px 4px;
    color: var(--text);
  }
  .letter-slot.revealed { border-bottom-color: var(--win); }
  .letter-slot.space { border-bottom-color: transparent; }

  .keyboard {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 5px;
    margin-bottom: 16px;
  }

  .key {
    background: var(--cell);
    color: var(--text);
    border: none;
    border-radius: 8px;
    padding: 10px 0;
    width: 42px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, transform 0.1s;
  }
  .key:not(:disabled):hover {
    background: var(--cell-hover);
    transform: translateY(-1px);
  }
  .key:disabled { cursor: default; opacity: 0.7; }
  .key.correct { background: rgba(34, 197, 94, 0.35); color: var(--text); }
  .key.wrong { background: rgba(239, 68, 68, 0.35); color: var(--text); }

  .hangman-stats, .three-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    text-align: center;
    font-size: 14px;
  }
  .stat-item {
    background: var(--cell);
    padding: 10px 6px;
    border-radius: 10px;
  }
  .stat-item .label {
    color: var(--muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-item .value {
    font-size: 22px;
    font-weight: 700;
    margin-top: 2px;
  }
  .stat-item.wins .value { color: var(--win); }
  .stat-item.losses .value { color: var(--lose); }
  .stat-item.errors .value, .stat-item.score .value, .stat-item.moves .value { color: var(--accent); }
  .stat-item.best .value { color: var(--x-color); }
  .stat-item.pairs .value { color: var(--win); }

  /* -------- Anagrammi -------- */

  .anagram-slots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
    min-height: 50px;
  }
  .anagram-slot {
    width: 38px;
    height: 48px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    border-bottom: 3px solid var(--cell);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.1s;
    user-select: none;
  }
  .anagram-slot.filled { background: var(--cell); border-bottom-color: var(--accent); }
  .anagram-slot.filled:hover { transform: translateY(-1px); }
  .anagram-slots.wrong .anagram-slot { animation: shake 0.4s; border-bottom-color: var(--lose); }
  .anagram-slots.correct .anagram-slot { border-bottom-color: var(--win); animation: pulse 0.6s; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .anagram-tiles {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
    min-height: 48px;
  }
  .anagram-tile {
    width: 42px;
    height: 48px;
    background: var(--cell);
    color: var(--text);
    border: none;
    border-radius: 8px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s, transform 0.1s, opacity 0.15s;
  }
  .anagram-tile:not(:disabled):hover {
    background: var(--cell-hover);
    transform: translateY(-2px);
  }
  .anagram-tile:disabled { opacity: 0.2; cursor: default; }

  /* -------- Memory -------- */

  .memory-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    aspect-ratio: 1 / 1;
    margin-bottom: 16px;
  }
  .memory-card {
    background: var(--cell);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: clamp(22px, 7vw, 36px);
    color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: background 0.2s, transform 0.2s;
    min-width: 0;
    min-height: 0;
  }
  .memory-card:not(:disabled):hover {
    background: var(--cell-hover);
    transform: scale(1.03);
  }
  .memory-card.flipped {
    background: #475569;
    color: var(--text);
  }
  .memory-card.matched {
    background: rgba(34, 197, 94, 0.3);
    color: var(--text);
    cursor: default;
  }
  .memory-card:disabled { cursor: default; }

  /* -------- 2048 -------- */

  .t2048-board {
    position: relative;
    aspect-ratio: 1 / 1;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 8px;
    margin-bottom: 16px;
    touch-action: none;
  }
  .t2048-bg {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    height: 100%;
  }
  .t2048-bg-cell {
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    min-width: 0;
    min-height: 0;
  }
  .t2048-tiles {
    position: absolute;
    inset: 8px;
    pointer-events: none;
    container-type: inline-size;
  }
  .t2048-tile {
    position: absolute;
    --cell-size: calc((100cqw - 24px) / 4);
    width: var(--cell-size);
    height: var(--cell-size);
    top: 0; left: 0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(20px, 6vw, 30px);
    font-weight: 700;
    color: #776e65;
    background: #eee4da;
    translate: calc(var(--c) * (var(--cell-size) + 8px)) calc(var(--r) * (var(--cell-size) + 8px));
    transition: translate 0.15s ease;
  }
  .t2048-tile.spawning { animation: tile-spawn 0.2s ease; }
  .t2048-tile.merged { animation: tile-merge 0.22s ease; }
  @keyframes tile-spawn {
    from { scale: 0; }
    to { scale: 1; }
  }
  @keyframes tile-merge {
    0%, 100% { scale: 1; }
    50% { scale: 1.18; }
  }
  .t2048-tile[data-v="2"] { background: #eee4da; }
  .t2048-tile[data-v="4"] { background: #ede0c8; }
  .t2048-tile[data-v="8"] { background: #f2b179; color: #f9f6f2; }
  .t2048-tile[data-v="16"] { background: #f59563; color: #f9f6f2; }
  .t2048-tile[data-v="32"] { background: #f67c5f; color: #f9f6f2; }
  .t2048-tile[data-v="64"] { background: #f65e3b; color: #f9f6f2; }
  .t2048-tile[data-v="128"] { background: #edcf72; color: #f9f6f2; font-size: clamp(18px, 5vw, 26px); }
  .t2048-tile[data-v="256"] { background: #edcc61; color: #f9f6f2; font-size: clamp(18px, 5vw, 26px); }
  .t2048-tile[data-v="512"] { background: #edc850; color: #f9f6f2; font-size: clamp(18px, 5vw, 26px); }
  .t2048-tile[data-v="1024"] { background: #edc53f; color: #f9f6f2; font-size: clamp(16px, 4vw, 22px); }
  .t2048-tile[data-v="2048"] { background: #edc22e; color: #f9f6f2; font-size: clamp(16px, 4vw, 22px); }

  footer {
    margin-top: 20px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
  <h1 id="title">Giochi</h1>
  <div class="lang-menu">
    <label for="lang-select" id="lang-label">Lingua</label>
    <select id="lang-select">
      <option value="it">Italiano</option>
      <option value="en-gb">English (British)</option>
      <option value="en-us">English (American)</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="zh">中文 (pinyin)</option>
      <option value="hi">हिन्दी (Roman)</option>
      <option value="la">Latina</option>
    </select>
  </div>
  <div class="game-menu">
    <button class="game-tab active" data-game="tris" data-i18n="tabs.tris">Tris</button>
    <button class="game-tab" data-game="impiccato" data-i18n="tabs.imp">Impiccato</button>
    <button class="game-tab" data-game="anagram" data-i18n="tabs.anagram">Anagrammi</button>
    <button class="game-tab" data-game="memory" data-i18n="tabs.memory">Memory</button>
    <button class="game-tab" data-game="t2048" data-i18n="tabs.t2048">2048</button>
  </div>

  <!-- ============= TRIS ============= -->
  <div id="game-tris" class="game-view">
    <div class="subtitle" id="tris-subtitle"></div>
    <div class="panel">
      <div class="controls">
        <button id="btn-human-first" class="active">Inizio io</button>
        <button id="btn-ai-first">Inizia l'IA</button>
        <button id="btn-reset">Nuova partita</button>
      </div>
      <div class="status" id="status">Tocca a te (X)</div>
      <div class="board" id="board">
        <button class="cell" data-i="0"></button>
        <button class="cell" data-i="1"></button>
        <button class="cell" data-i="2"></button>
        <button class="cell" data-i="3"></button>
        <button class="cell" data-i="4"></button>
        <button class="cell" data-i="5"></button>
        <button class="cell" data-i="6"></button>
        <button class="cell" data-i="7"></button>
        <button class="cell" data-i="8"></button>
      </div>
      <div class="scoreboard">
        <div class="score-item you">
          <div class="label" id="lbl-score-you">Tu</div>
          <div class="value" id="score-you">0</div>
        </div>
        <div class="score-item draws">
          <div class="label" id="lbl-score-draws">Patte</div>
          <div class="value" id="score-draws">0</div>
        </div>
        <div class="score-item ai">
          <div class="label" id="lbl-score-ai">IA</div>
          <div class="value" id="score-ai">0</div>
        </div>
      </div>
    </div>
    <footer id="tris-footer"></footer>
  </div>

  <!-- ============= IMPICCATO ============= -->
  <div id="game-impiccato" class="game-view hidden">
    <div class="subtitle" id="imp-subtitle"></div>
    <div class="panel">
      <div class="controls">
        <button id="hm-new">Nuova parola</button>
      </div>
      <svg class="hangman-svg" viewBox="0 0 180 220">
        <line x1="10" y1="210" x2="170" y2="210"/>
        <line class="part" data-part="0" x1="40" y1="210" x2="40" y2="15"/>
        <line class="part" data-part="1" x1="40" y1="15" x2="125" y2="15"/>
        <line class="part" data-part="2" x1="125" y1="15" x2="125" y2="35"/>
        <circle class="part" data-part="3" cx="125" cy="52" r="16"/>
        <line class="part" data-part="4" x1="125" y1="68" x2="125" y2="130"/>
        <line class="part" data-part="5" x1="125" y1="85" x2="100" y2="110"/>
        <line class="part" data-part="6" x1="125" y1="85" x2="150" y2="110"/>
        <line class="part" data-part="7" x1="125" y1="130" x2="100" y2="170"/>
        <line class="part" data-part="8" x1="125" y1="130" x2="150" y2="170"/>
      </svg>
      <div class="status" id="hm-status"></div>
      <div class="word-display" id="hm-word"></div>
      <div class="keyboard" id="hm-keyboard"></div>
      <div class="hangman-stats">
        <div class="stat-item wins">
          <div class="label" id="lbl-hm-wins">Vittorie</div>
          <div class="value" id="hm-wins">0</div>
        </div>
        <div class="stat-item errors">
          <div class="label" id="lbl-hm-errors">Errori</div>
          <div class="value" id="hm-errors">0/9</div>
        </div>
        <div class="stat-item losses">
          <div class="label" id="lbl-hm-losses">Sconfitte</div>
          <div class="value" id="hm-losses">0</div>
        </div>
      </div>
    </div>
    <footer id="imp-footer"></footer>
  </div>

  <!-- ============= ANAGRAMMI ============= -->
  <div id="game-anagram" class="game-view hidden">
    <div class="subtitle" id="an-subtitle"></div>
    <div class="panel">
      <div class="controls">
        <button id="an-new">Nuova parola</button>
        <button id="an-clear">Cancella</button>
      </div>
      <div class="status" id="an-status"></div>
      <div class="anagram-slots" id="an-slots"></div>
      <div class="anagram-tiles" id="an-tiles"></div>
      <div class="three-stats">
        <div class="stat-item wins">
          <div class="label" id="lbl-an-wins">Indovinate</div>
          <div class="value" id="an-wins">0</div>
        </div>
        <div class="stat-item losses">
          <div class="label" id="lbl-an-losses">Saltate</div>
          <div class="value" id="an-losses">0</div>
        </div>
        <div class="stat-item best">
          <div class="label" id="lbl-an-best">Record</div>
          <div class="value" id="an-best">0</div>
        </div>
      </div>
    </div>
    <footer id="an-footer"></footer>
  </div>

  <!-- ============= MEMORY ============= -->
  <div id="game-memory" class="game-view hidden">
    <div class="subtitle" id="mem-subtitle"></div>
    <div class="panel">
      <div class="controls">
        <button id="mem-new">Nuova partita</button>
      </div>
      <div class="status" id="mem-status"></div>
      <div class="memory-board" id="mem-board"></div>
      <div class="three-stats">
        <div class="stat-item moves">
          <div class="label" id="lbl-mem-moves">Mosse</div>
          <div class="value" id="mem-moves">0</div>
        </div>
        <div class="stat-item pairs">
          <div class="label" id="lbl-mem-pairs">Coppie</div>
          <div class="value" id="mem-pairs">0/8</div>
        </div>
        <div class="stat-item best">
          <div class="label" id="lbl-mem-best">Record</div>
          <div class="value" id="mem-best">–</div>
        </div>
      </div>
    </div>
    <footer id="mem-footer"></footer>
  </div>

  <!-- ============= 2048 ============= -->
  <div id="game-t2048" class="game-view hidden">
    <div class="subtitle" id="t2048-subtitle"></div>
    <div class="panel">
      <div class="controls">
        <button id="t2048-new">Nuovo gioco</button>
      </div>
      <div class="status" id="t2048-status"></div>
      <div class="t2048-board" id="t2048-board"></div>
      <div class="three-stats">
        <div class="stat-item score">
          <div class="label" id="lbl-t2048-score">Punteggio</div>
          <div class="value" id="t2048-score">0</div>
        </div>
        <div class="stat-item best">
          <div class="label" id="lbl-t2048-best">Record</div>
          <div class="value" id="t2048-best">0</div>
        </div>
        <div class="stat-item wins">
          <div class="label" id="lbl-t2048-max">Max</div>
          <div class="value" id="t2048-max">2</div>
        </div>
      </div>
    </div>
    <footer id="t2048-footer"></footer>
  </div>

<script>
// =========================================================================
// i18n

let lastBgIndex = -1;
function changeBackground() {
  let idx;
  do {
    idx = Math.floor(Math.random() * BACKGROUNDS.length);

// TRIS
// =========================================================================
const Tris = (() => {
  const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const CORNERS = [0,2,6,8];
  const SIDES = [1,3,5,7];
  const OPPOSITE_CORNER = { 0:8, 2:6, 6:2, 8:0 };

  let board, currentPlayer, humanMark, aiMark, gameOver, humanStarts;
  let autoRestartTimer = null;
  const score = { you: 0, ai: 0, draws: 0 };

  const cells = [...document.querySelectorAll('#game-tris .cell')];
  const statusEl = document.getElementById('status');
  const btnHumanFirst = document.getElementById('btn-human-first');
  const btnAiFirst = document.getElementById('btn-ai-first');
  const btnReset = document.getElementById('btn-reset');

  function init(humanFirst) {
    if (autoRestartTimer !== null) { clearTimeout(autoRestartTimer); autoRestartTimer = null; }
    humanStarts = humanFirst;
    board = Array(9).fill('');
    gameOver = false;
    changeBackground();
    if (humanFirst) {
      humanMark = 'X'; aiMark = 'O'; currentPlayer = humanMark;
      statusEl.textContent = T().tris.yourTurn(humanMark);
    } else {
      humanMark = 'O'; aiMark = 'X'; currentPlayer = aiMark;
      statusEl.textContent = T().tris.aiThinking;
    }
    statusEl.className = 'status';
    cells.forEach(c => { c.textContent = ''; c.disabled = false; c.classList.remove('x','o','win-line'); });
    if (!humanFirst) setTimeout(aiMove, 250);
  }

  function checkWinner(b) {
    for (const line of LINES) {
      const [a,c,d] = line;
      if (b[a] && b[a] === b[c] && b[c] === b[d]) return { winner: b[a], line };
    }
    if (b.every(v => v !== '')) return { winner: 'draw' };
    return null;
  }

  function placeMark(i, mark) {
    board[i] = mark;
    const cell = cells[i];
    cell.textContent = mark;
    cell.classList.add(mark.toLowerCase());
    cell.disabled = true;
  }

  function endGame(result) {
    gameOver = true;
    cells.forEach(c => c.disabled = true);
    if (result.winner === 'draw') {
      statusEl.textContent = T().tris.draw;
      statusEl.className = 'status draw';
      score.draws++;
    } else if (result.winner === humanMark) {
      statusEl.textContent = T().tris.youWon;
      statusEl.className = 'status win';
      score.you++;
    } else {
      statusEl.textContent = T().tris.aiWon;
      statusEl.className = 'status lose';
      score.ai++;
    }
    if (result.line) result.line.forEach(i => cells[i].classList.add('win-line'));
    document.getElementById('score-you').textContent = score.you;
    document.getElementById('score-ai').textContent = score.ai;
    document.getElementById('score-draws').textContent = score.draws;
    autoRestartTimer = setTimeout(() => { autoRestartTimer = null; init(humanStarts); }, 1000);
  }

  function onCellClick(e) {
    if (gameOver) return;
    const i = Number(e.currentTarget.dataset.i);
    if (board[i] !== '' || currentPlayer !== humanMark) return;
    placeMark(i, humanMark);
    const result = checkWinner(board);
    if (result) return endGame(result);
    currentPlayer = aiMark;
    statusEl.textContent = T().tris.aiThinking;
    setTimeout(aiMove, 280);
  }

  function aiMove() {
    if (gameOver) return;
    const i = chooseAiMove();
    placeMark(i, aiMark);
    const result = checkWinner(board);
    if (result) return endGame(result);
    currentPlayer = humanMark;
    statusEl.textContent = T().tris.yourTurn(humanMark);
  }

  function findWinningMove(b, player) {
    for (const [a,c,d] of LINES) {
      const arr = [b[a], b[c], b[d]];
      const p = arr.filter(x => x === player).length;
      const e = arr.filter(x => x === '').length;
      if (p === 2 && e === 1) return [a,c,d].find(idx => b[idx] === '');
    }
    return null;
  }

  function countOpenTwos(b, player) {
    let n = 0;
    for (const [a,c,d] of LINES) {
      const arr = [b[a], b[c], b[d]];
      const p = arr.filter(x => x === player).length;
      const o = arr.filter(x => x !== '' && x !== player).length;
      if (p === 2 && o === 0) n++;
    }
    return n;
  }

  function findForkMoves(b, player) {
    const moves = [];
    for (let i = 0; i < 9; i++) {
      if (b[i] !== '') continue;
      const copy = b.slice(); copy[i] = player;
      if (countOpenTwos(copy, player) >= 2) moves.push(i);
    }
    return moves;
  }

  function findThreatMoves(b, player) {
    const out = [];
    for (let i = 0; i < 9; i++) {
      if (b[i] !== '') continue;
      const copy = b.slice(); copy[i] = player;
      const blocks = [];
      for (const [a,c,d] of LINES) {
        const arr = [copy[a], copy[c], copy[d]];
        const p = arr.filter(x => x === player).length;
        const e = arr.filter(x => x === '').length;
        if (p === 2 && e === 1) blocks.push([a,c,d].find(idx => copy[idx] === ''));
      }
      if (blocks.length === 1) out.push({ move: i, forcedBlock: blocks[0] });
    }
    return out;
  }

  function chooseAiMove() {
    const me = aiMark, opp = humanMark;
    let m = findWinningMove(board, me);
    if (m !== null) return m;
    m = findWinningMove(board, opp);
    if (m !== null) return m;
    const myForks = findForkMoves(board, me);
    if (myForks.length > 0) return myForks[0];
    const oppForks = findForkMoves(board, opp);
    if (oppForks.length === 1) return oppForks[0];
    if (oppForks.length > 1) {
      const threats = findThreatMoves(board, me);
      for (const { move, forcedBlock } of threats) {
        if (!oppForks.includes(forcedBlock)) return move;
      }
      return oppForks[0];
    }
    if (board[4] === '') return 4;
    for (const c of CORNERS) {
      if (board[c] === opp && board[OPPOSITE_CORNER[c]] === '') return OPPOSITE_CORNER[c];
    }
    for (const c of CORNERS) if (board[c] === '') return c;
    for (const s of SIDES) if (board[s] === '') return s;
    return -1;
  }

  cells.forEach(c => c.addEventListener('click', onCellClick));
  btnHumanFirst.addEventListener('click', () => {
    btnHumanFirst.classList.add('active');
    btnAiFirst.classList.remove('active');
    init(true);
  });
  btnAiFirst.addEventListener('click', () => {
    btnAiFirst.classList.add('active');
    btnHumanFirst.classList.remove('active');
    init(false);
  });
  btnReset.addEventListener('click', () => init(humanStarts));

  function refreshText() {
    const t = T().tris;
    document.getElementById('tris-subtitle').textContent = t.subtitle;
    btnHumanFirst.textContent = t.btnHumanFirst;
    btnAiFirst.textContent = t.btnAiFirst;
    btnReset.textContent = t.btnReset;
    document.getElementById('lbl-score-you').textContent = t.scoreYou;
    document.getElementById('lbl-score-draws').textContent = t.scoreDraws;
    document.getElementById('lbl-score-ai').textContent = t.scoreAi;
    document.getElementById('tris-footer').textContent = t.footer;
    if (gameOver) return;
    statusEl.textContent = (currentPlayer === humanMark) ? t.yourTurn(humanMark) : t.aiThinking;
  }

  function resetScores() {
    score.you = 0; score.ai = 0; score.draws = 0;
    document.getElementById('score-you').textContent = 0;
    document.getElementById('score-ai').textContent = 0;
    document.getElementById('score-draws').textContent = 0;
  }

  return { init: () => init(true), refreshText, resetScores };
})();

const Impiccato = (() => {
  const MAX_ERRORS = 9;
  const stats = { wins: 0, losses: 0 };
  let currentWord = '', guessed = new Set(), errors = 0, gameOver = false;
  let autoRestartTimer = null, lastWord = '';

  const statusEl = document.getElementById('hm-status');
  const wordEl = document.getElementById('hm-word');
  const keyboardEl = document.getElementById('hm-keyboard');
  const errorsEl = document.getElementById('hm-errors');
  const winsEl = document.getElementById('hm-wins');
  const lossesEl = document.getElementById('hm-losses');
  const partEls = [...document.querySelectorAll('#game-impiccato .part')];
  const btnNew = document.getElementById('hm-new');

  function pickWord() {
    const pool = WORDS[currentLang] || WORDS.it;
    let w;
    do { w = pool[Math.floor(Math.random() * pool.length)]; } while (w === lastWord && pool.length > 1);
    lastWord = w;
    return w.toUpperCase();
  }

  function renderWord() {
    wordEl.innerHTML = '';
    for (const ch of currentWord) {
      const span = document.createElement('span');
      span.className = 'letter-slot';
      if (guessed.has(ch)) { span.textContent = ch; span.classList.add('revealed'); }
      else span.textContent = ' ';
      wordEl.appendChild(span);
    }
  }

  function renderKeyboard() {
    keyboardEl.innerHTML = '';
    const alphabet = ALPHABETS[currentLang] || ALPHABETS.it;
    for (const letter of alphabet) {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = letter;
      btn.dataset.letter = letter;
      btn.addEventListener('click', () => onGuess(letter));
      if (guessed.has(letter)) {
        btn.disabled = true;
        btn.classList.add(currentWord.includes(letter) ? 'correct' : 'wrong');
      }
      keyboardEl.appendChild(btn);
    }
  }

  function renderHangman() {
    partEls.forEach((el, i) => el.classList.toggle('shown', i < errors));
    errorsEl.textContent = `${errors}/${MAX_ERRORS}`;
  }

  function onGuess(letter) {
    if (gameOver || guessed.has(letter)) return;
    guessed.add(letter);
    const btn = keyboardEl.querySelector(`[data-letter="${letter}"]`);
    if (btn) btn.disabled = true;
    if (currentWord.includes(letter)) {
      if (btn) btn.classList.add('correct');
      renderWord();
      if ([...currentWord].every(ch => guessed.has(ch))) endGame(true);
    } else {
      if (btn) btn.classList.add('wrong');
      errors++;
      renderHangman();
      if (errors >= MAX_ERRORS) endGame(false);
    }
  }

  function endGame(won) {
    gameOver = true;
    if (won) {
      statusEl.textContent = T().imp.won(currentWord);
      statusEl.className = 'status win';
      stats.wins++;
    } else {
      statusEl.textContent = T().imp.lost(currentWord);
      statusEl.className = 'status lose';
      stats.losses++;
      [...wordEl.children].forEach((slot, i) => { slot.textContent = currentWord[i]; slot.classList.add('revealed'); });
    }
    winsEl.textContent = stats.wins;
    lossesEl.textContent = stats.losses;
    keyboardEl.querySelectorAll('.key').forEach(b => b.disabled = true);
    autoRestartTimer = setTimeout(() => { autoRestartTimer = null; init(); }, 1000);
  }

  function init() {
    if (autoRestartTimer !== null) { clearTimeout(autoRestartTimer); autoRestartTimer = null; }
    currentWord = pickWord();
    guessed = new Set([currentWord[0], currentWord[currentWord.length - 1]]);
    errors = 0;
    gameOver = false;
    changeBackground();
    statusEl.textContent = T().imp.guess;
    statusEl.className = 'status';
    renderWord();
    renderKeyboard();
    renderHangman();
    if ([...currentWord].every(ch => guessed.has(ch))) endGame(true);
  }

  function refreshText() {
    const t = T().imp;
    document.getElementById('imp-subtitle').textContent = t.subtitle;
    btnNew.textContent = t.btnNew;
    document.getElementById('lbl-hm-wins').textContent = t.statWins;
    document.getElementById('lbl-hm-errors').textContent = t.statErrors;
    document.getElementById('lbl-hm-losses').textContent = t.statLosses;
    const alphLen = (ALPHABETS[currentLang] || ALPHABETS.it).length;
    document.getElementById('imp-footer').textContent = t.footer(alphLen);
    if (!gameOver) statusEl.textContent = t.guess;
  }

  function resetStats() {
    stats.wins = 0; stats.losses = 0;
    winsEl.textContent = 0; lossesEl.textContent = 0;
  }

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('game-impiccato').classList.contains('hidden')) return;
    const ch = e.key.toUpperCase();
    const alphabet = ALPHABETS[currentLang] || ALPHABETS.it;
    if (alphabet.includes(ch)) onGuess(ch);
  });

  btnNew.addEventListener('click', () => init());

  return { init, refreshText, resetStats };
})();

const Anagram = (() => {
  const stats = { wins: 0, losses: 0, streak: 0, best: 0 };
  let currentWord = '', placedTileIdx = [], tilesUsed = [];
  let autoRestartTimer = null, lastWord = '', gameOver = false;

  const subtitleEl = document.getElementById('an-subtitle');
  const statusEl = document.getElementById('an-status');
  const slotsEl = document.getElementById('an-slots');
  const tilesEl = document.getElementById('an-tiles');
  const winsEl = document.getElementById('an-wins');
  const lossesEl = document.getElementById('an-losses');
  const bestEl = document.getElementById('an-best');
  const btnNew = document.getElementById('an-new');
  const btnClear = document.getElementById('an-clear');

  function pickWord() {
    const pool = WORDS[currentLang] || WORDS.it;
    let w;
    do {
      w = pool[Math.floor(Math.random() * pool.length)];
    } while ((w === lastWord || w.length < 4) && pool.length > 1);
    lastWord = w;
    return w.toUpperCase();
  }

  function scramble(word) {
    const letters = [...word];
    // assicurati che lo scramble non sia uguale alla parola originale
    for (let attempt = 0; attempt < 20; attempt++) {
      for (let i = letters.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [letters[i], letters[j]] = [letters[j], letters[i]];
      }
      if (letters.join('') !== word) return letters;
    }
    return letters;
  }

  function renderSlots() {
    slotsEl.innerHTML = '';
    slotsEl.classList.remove('wrong', 'correct');
    for (let i = 0; i < currentWord.length; i++) {
      const slot = document.createElement('div');
      slot.className = 'anagram-slot';
      if (placedTileIdx[i] !== undefined) {
        slot.textContent = tilesUsed[placedTileIdx[i]].letter;
        slot.classList.add('filled');
        slot.addEventListener('click', () => removeFromSlot(i));
      }
      slotsEl.appendChild(slot);
    }
  }

  function renderTiles() {
    tilesEl.innerHTML = '';
    tilesUsed.forEach((tile, idx) => {
      const btn = document.createElement('button');
      btn.className = 'anagram-tile';
      btn.textContent = tile.letter;
      btn.disabled = tile.used;
      btn.addEventListener('click', () => placeTile(idx));
      tilesEl.appendChild(btn);
    });
  }

  function placeTile(idx) {
    if (gameOver) return;
    if (tilesUsed[idx].used) return;
    const nextSlot = placedTileIdx.findIndex(v => v === undefined);
    const targetSlot = nextSlot === -1 ? placedTileIdx.length : nextSlot;
    if (targetSlot >= currentWord.length) return;
    placedTileIdx[targetSlot] = idx;
    tilesUsed[idx].used = true;
    renderSlots();
    renderTiles();
    if (placedTileIdx.filter(v => v !== undefined).length === currentWord.length) verify();
  }

  function removeFromSlot(i) {
    if (gameOver) return;
    const tileIdx = placedTileIdx[i];
    if (tileIdx === undefined) return;
    tilesUsed[tileIdx].used = false;
    placedTileIdx[i] = undefined;
    slotsEl.classList.remove('wrong');
    renderSlots();
    renderTiles();
  }

  function verify() {
    const guess = placedTileIdx.map(idx => tilesUsed[idx].letter).join('');
    if (guess === currentWord) {
      gameOver = true;
      slotsEl.classList.add('correct');
      statusEl.textContent = T().anagram.correct(currentWord);
      statusEl.className = 'status win';
      stats.wins++;
      stats.streak++;
      if (stats.streak > stats.best) {
        stats.best = stats.streak;
        localStorage.setItem('anagram-best-' + currentLang, stats.best);
      }
      winsEl.textContent = stats.wins;
      bestEl.textContent = stats.best;
      autoRestartTimer = setTimeout(() => { autoRestartTimer = null; init(); }, 1000);
    } else {
      slotsEl.classList.add('wrong');
      statusEl.textContent = T().anagram.wrong;
      statusEl.className = 'status lose';
      setTimeout(() => {
        if (gameOver) return;
        clearSlots();
        statusEl.textContent = T().anagram.guess;
        statusEl.className = 'status';
      }, 700);
    }
  }

  function clearSlots() {
    placedTileIdx = new Array(currentWord.length).fill(undefined);
    tilesUsed.forEach(t => t.used = false);
    slotsEl.classList.remove('wrong', 'correct');
    renderSlots();
    renderTiles();
  }

  function skip() {
    if (gameOver) return;
    stats.streak = 0;
    stats.losses++;
    lossesEl.textContent = stats.losses;
    init();
  }

  function init() {
    if (autoRestartTimer !== null) { clearTimeout(autoRestartTimer); autoRestartTimer = null; }
    currentWord = pickWord();
    const scrambled = scramble(currentWord);
    tilesUsed = scrambled.map(letter => ({ letter, used: false }));
    placedTileIdx = new Array(currentWord.length).fill(undefined);
    gameOver = false;
    changeBackground();
    statusEl.textContent = T().anagram.guess;
    statusEl.className = 'status';
    renderSlots();
    renderTiles();
    // ricarica record per la lingua attuale
    stats.best = parseInt(localStorage.getItem('anagram-best-' + currentLang) || '0', 10);
    bestEl.textContent = stats.best;
  }

  function refreshText() {
    const t = T().anagram;
    subtitleEl.textContent = t.subtitle;
    btnNew.textContent = t.btnNew;
    btnClear.textContent = t.btnClear;
    document.getElementById('lbl-an-wins').textContent = t.statWins;
    document.getElementById('lbl-an-losses').textContent = t.statLosses;
    document.getElementById('lbl-an-best').textContent = t.statBest;
    document.getElementById('an-footer').textContent = t.footer;
    if (!gameOver) statusEl.textContent = t.guess;
  }

  function resetStats() {
    stats.wins = 0; stats.losses = 0; stats.streak = 0;
    winsEl.textContent = 0; lossesEl.textContent = 0;
    stats.best = parseInt(localStorage.getItem('anagram-best-' + currentLang) || '0', 10);
    bestEl.textContent = stats.best;
  }

  btnNew.addEventListener('click', () => skip());
  btnClear.addEventListener('click', () => clearSlots());

  return { init, refreshText, resetStats };
})();

const Memory = (() => {
  const EMOJIS = ['🐶','🐱','🦊','🐯','🐻','🐼','🦁','🐰'];
  const stats = { moves: 0, pairs: 0, best: null };
  let cards = [], flipped = [], matched = new Set(), busy = false, gameOver = false;
  let autoRestartTimer = null;

  const subtitleEl = document.getElementById('mem-subtitle');
  const statusEl = document.getElementById('mem-status');
  const boardEl = document.getElementById('mem-board');
  const movesEl = document.getElementById('mem-moves');
  const pairsEl = document.getElementById('mem-pairs');
  const bestEl = document.getElementById('mem-best');
  const btnNew = document.getElementById('mem-new');

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function renderBoard() {
    boardEl.innerHTML = '';
    cards.forEach((emoji, idx) => {
      const btn = document.createElement('button');
      btn.className = 'memory-card';
      btn.dataset.i = idx;
      btn.textContent = emoji;
      if (flipped.includes(idx) || matched.has(idx)) btn.classList.add('flipped');
      if (matched.has(idx)) { btn.classList.add('matched'); btn.disabled = true; }
      btn.addEventListener('click', () => flip(idx));
      boardEl.appendChild(btn);
    });
  }

  function flip(idx) {
    if (busy || gameOver) return;
    if (flipped.includes(idx) || matched.has(idx)) return;
    if (flipped.length >= 2) return;
    flipped.push(idx);
    renderBoard();
    if (flipped.length === 2) {
      stats.moves++;
      movesEl.textContent = stats.moves;
      const [a, b] = flipped;
      if (cards[a] === cards[b]) {
        matched.add(a); matched.add(b);
        flipped = [];
        stats.pairs++;
        pairsEl.textContent = `${stats.pairs}/8`;
        renderBoard();
        if (stats.pairs === 8) endGame();
      } else {
        busy = true;
        setTimeout(() => {
          flipped = [];
          busy = false;
          renderBoard();
        }, 700);
      }
    }
  }

  function endGame() {
    gameOver = true;
    statusEl.textContent = T().memory.won(stats.moves);
    statusEl.className = 'status win';
    if (stats.best === null || stats.moves < stats.best) {
      stats.best = stats.moves;
      localStorage.setItem('memory-best', stats.best);
      bestEl.textContent = stats.best;
    }
    autoRestartTimer = setTimeout(() => { autoRestartTimer = null; init(); }, 1500);
  }

  function init() {
    if (autoRestartTimer !== null) { clearTimeout(autoRestartTimer); autoRestartTimer = null; }
    cards = shuffle([...EMOJIS, ...EMOJIS]);
    flipped = [];
    matched = new Set();
    stats.moves = 0;
    stats.pairs = 0;
    busy = false;
    gameOver = false;
    changeBackground();
    statusEl.textContent = T().memory.play;
    statusEl.className = 'status';
    movesEl.textContent = 0;
    pairsEl.textContent = '0/8';
    const stored = localStorage.getItem('memory-best');
    stats.best = stored ? parseInt(stored, 10) : null;
    bestEl.textContent = stats.best ?? '–';
    renderBoard();
  }

  function refreshText() {
    const t = T().memory;
    subtitleEl.textContent = t.subtitle;
    btnNew.textContent = t.btnNew;
    document.getElementById('lbl-mem-moves').textContent = t.statMoves;
    document.getElementById('lbl-mem-pairs').textContent = t.statPairs;
    document.getElementById('lbl-mem-best').textContent = t.statBest;
    document.getElementById('mem-footer').textContent = t.footer;
    if (!gameOver) statusEl.textContent = t.play;
  }

  function resetStats() {
    // Memory best è globale (gli emoji non cambiano per lingua), non lo azzeriamo
    stats.moves = 0;
    stats.pairs = 0;
    movesEl.textContent = 0;
    pairsEl.textContent = '0/8';
  }

  btnNew.addEventListener('click', () => init());

  return { init, refreshText, resetStats };
})();

// =========================================================================
// 2048
// =========================================================================
const T2048 = (() => {
  const SIZE = 4;
  const ANIM_MS = 160;
  let grid; // 4x4, ciascuna cella contiene un tile object o null
  let tiles; // array di { id, value, r, c, el, mergedThisTurn, consumed }
  let nextTileId, score, best, maxTile, gameOver, won, moving;

  const subtitleEl = document.getElementById('t2048-subtitle');
  const statusEl = document.getElementById('t2048-status');
  const boardEl = document.getElementById('t2048-board');
  const scoreEl = document.getElementById('t2048-score');
  const bestEl = document.getElementById('t2048-best');
  const maxEl = document.getElementById('t2048-max');
  const btnNew = document.getElementById('t2048-new');
  let bgEl, tilesLayerEl;

  function setupBoard() {
    boardEl.innerHTML = '';
    bgEl = document.createElement('div');
    bgEl.className = 't2048-bg';
    for (let i = 0; i < SIZE * SIZE; i++) {
      const c = document.createElement('div');
      c.className = 't2048-bg-cell';
      bgEl.appendChild(c);
    }
    boardEl.appendChild(bgEl);
    tilesLayerEl = document.createElement('div');
    tilesLayerEl.className = 't2048-tiles';
    boardEl.appendChild(tilesLayerEl);
  }

  function emptyGrid() { return Array.from({ length: SIZE }, () => Array(SIZE).fill(null)); }

  function positionTileEl(tile) {
    tile.el.style.setProperty('--r', tile.r);
    tile.el.style.setProperty('--c', tile.c);
  }

  function createTile(value, r, c, animate = true) {
    const el = document.createElement('div');
    el.className = 't2048-tile';
    el.dataset.v = value;
    el.textContent = value;
    el.style.setProperty('--r', r);
    el.style.setProperty('--c', c);
    if (animate) {
      el.classList.add('spawning');
      setTimeout(() => el.classList.remove('spawning'), 220);
    }
    tilesLayerEl.appendChild(el);
    const tile = { id: nextTileId++, value, r, c, el };
    tiles.push(tile);
    grid[r][c] = tile;
    return tile;
  }

  function spawnTile() {
    const empties = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!grid[r][c]) empties.push([r, c]);
    if (!empties.length) return null;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    return createTile(Math.random() < 0.9 ? 2 : 4, r, c);
  }

  function move(dir) {
    if (gameOver || moving) return false;
    const dirVec = [[0,-1],[-1,0],[0,1],[1,0]][dir];
    const rs = (dir === 3) ? [3,2,1,0] : [0,1,2,3];
    const cs = (dir === 2) ? [3,2,1,0] : [0,1,2,3];

    tiles.forEach(t => { t.mergedThisTurn = false; });

    let moved = false;
    let gained = 0;
    const consumed = [];
    const pendingMerges = []; // { survivor, newValue }

    for (const r of rs) {
      for (const c of cs) {
        const tile = grid[r][c];
        if (!tile) continue;
        let nr = r, nc = c;
        let mergeWith = null;
        while (true) {
          const tr = nr + dirVec[0], tc = nc + dirVec[1];
          if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
          const target = grid[tr][tc];
          if (!target) { nr = tr; nc = tc; }
          else if (target.value === tile.value && !target.mergedThisTurn) {
            mergeWith = target;
            nr = tr; nc = tc;
            break;
          } else break;
        }
        if (mergeWith) {
          grid[r][c] = null;
          mergeWith.mergedThisTurn = true;
          const newValue = mergeWith.value * 2;
          gained += newValue;
          tile.r = nr; tile.c = nc;
          tile.consumed = true;
          consumed.push(tile);
          pendingMerges.push({ survivor: mergeWith, newValue });
          moved = true;
        } else if (nr !== r || nc !== c) {
          grid[r][c] = null;
          grid[nr][nc] = tile;
          tile.r = nr; tile.c = nc;
          moved = true;
        }
      }
    }

    if (!moved) return false;

    score += gained;
    if (score > best) { best = score; localStorage.setItem('t2048-best', best); }
    scoreEl.textContent = score;
    bestEl.textContent = best;

    // Aggiorna posizione di tutti i tile (CSS transition fa lo slide)
    tiles.forEach(t => positionTileEl(t));

    moving = true;
    setTimeout(() => {
      // Finalizza i merge: cambia valore al sopravvissuto + pop animation
      pendingMerges.forEach(({ survivor, newValue }) => {
        survivor.value = newValue;
        if (survivor.el) {
          survivor.el.dataset.v = newValue;
          survivor.el.textContent = newValue;
          survivor.el.classList.remove('merged');
          void survivor.el.offsetWidth;
          survivor.el.classList.add('merged');
        }
        if (newValue > maxTile) maxTile = newValue;
      });
      maxEl.textContent = maxTile;

      // Rimuovi i tile consumati
      consumed.forEach(t => { if (t.el) t.el.remove(); });
      tiles = tiles.filter(t => !t.consumed);

      // Spawn nuova tessera
      spawnTile();

      // Stato finale
      if (!won && maxTile >= 2048) { won = true; statusEl.textContent = T().t2048.won; statusEl.className = 'status win'; }
      else if (!canMove()) { gameOver = true; statusEl.textContent = T().t2048.lost; statusEl.className = 'status lose'; }

      moving = false;
    }, ANIM_MS);

    return true;
  }

  function canMove() {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (!grid[r][c]) return true;
        const v = grid[r][c].value;
        if (r + 1 < SIZE && grid[r+1][c] && grid[r+1][c].value === v) return true;
        if (c + 1 < SIZE && grid[r][c+1] && grid[r][c+1].value === v) return true;
      }
    }
    return false;
  }

  function init() {
    setupBoard();
    grid = emptyGrid();
    tiles = [];
    nextTileId = 1;
    score = 0;
    maxTile = 2;
    gameOver = false;
    won = false;
    moving = false;
    best = parseInt(localStorage.getItem('t2048-best') || '0', 10);
    changeBackground();
    spawnTile();
    spawnTile();
    statusEl.textContent = T().t2048.play;
    statusEl.className = 'status';
    scoreEl.textContent = 0;
    bestEl.textContent = best;
    maxEl.textContent = maxTile;
  }

  function refreshText() {
    const t = T().t2048;
    subtitleEl.textContent = t.subtitle;
    btnNew.textContent = t.btnNew;
    document.getElementById('lbl-t2048-score').textContent = t.statScore;
    document.getElementById('lbl-t2048-best').textContent = t.statBest;
    document.getElementById('lbl-t2048-max').textContent = t.statMax;
    document.getElementById('t2048-footer').textContent = t.footer;
    if (!gameOver && !won) statusEl.textContent = t.play;
  }

  function resetStats() {
    score = 0;
    scoreEl.textContent = 0;
  }

  // Tastiera
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('game-t2048').classList.contains('hidden')) return;
    let dir = -1;
    if (e.key === 'ArrowLeft') dir = 0;
    else if (e.key === 'ArrowUp') dir = 1;
    else if (e.key === 'ArrowRight') dir = 2;
    else if (e.key === 'ArrowDown') dir = 3;
    if (dir >= 0) { e.preventDefault(); move(dir); }
  });

  // Swipe
  let touchStart = null;
  boardEl.addEventListener('touchstart', (e) => {
    const t = e.changedTouches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  boardEl.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const absX = Math.abs(dx), absY = Math.abs(dy);
    touchStart = null;
    if (Math.max(absX, absY) < 20) return;
    let dir;
    if (absX > absY) dir = dx > 0 ? 2 : 0;
    else dir = dy > 0 ? 3 : 1;
    move(dir);
  }, { passive: true });

  btnNew.addEventListener('click', () => init());

  return { init, refreshText, resetStats };
})();

// =========================================================================
// Menù di selezione gioco
// =========================================================================
const tabs = [...document.querySelectorAll('.game-tab')];
const views = {
  tris: document.getElementById('game-tris'),
  impiccato: document.getElementById('game-impiccato'),
  anagram: document.getElementById('game-anagram'),
  memory: document.getElementById('game-memory'),
  t2048: document.getElementById('game-t2048')
};

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const game = tab.dataset.game;
    tabs.forEach(t => t.classList.toggle('active', t === tab));
    Object.entries(views).forEach(([k, el]) => el.classList.toggle('hidden', k !== game));
  });
});

// =========================================================================
// Selettore lingua
// =========================================================================
function applyLanguage(lang) {
  if (!(lang in I18N)) lang = 'it';
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang.split('-')[0];
  const t = T();
  document.getElementById('title').textContent = t.title;
  document.getElementById('lang-label').textContent = t.langLabel;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const parts = key.split('.');
    let val = t;
    for (const p of parts) val = val?.[p];
    if (typeof val === 'string') el.textContent = val;
  });
  Tris.refreshText();
  Impiccato.refreshText();
  Anagram.refreshText();
  Memory.refreshText();
  T2048.refreshText();
}

const langSelect = document.getElementById('lang-select');
langSelect.value = currentLang;
langSelect.addEventListener('change', (e) => {
  applyLanguage(e.target.value);
  Tris.resetScores();
  Impiccato.resetStats();
  Anagram.resetStats();
  Memory.resetStats();
  T2048.resetStats();
  // gli unici giochi dove cambio lingua = nuove parole/parametri sono impiccato e anagrammi
  Impiccato.init();
  Anagram.init();
});

// Avvio
Tris.init();
Impiccato.init();
Anagram.init();
Memory.init();
T2048.init();
applyLanguage(currentLang);
</script>
