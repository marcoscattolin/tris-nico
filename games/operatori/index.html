<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="../../shared/gtm.js"></script>
<title>Operatori mancanti — Casual Games</title>
<meta name="description" content="Inserisci + − × ÷ tra 4 numeri per raggiungere il target. Esercizio di matematica mentale nel browser." />
<link rel="canonical" href="https://casualkidsgames.netlify.app/games/operatori/" />
<meta property="og:title" content="Operatori mancanti — Casual Games" />
<meta property="og:description" content="Inserisci + − × ÷ tra 4 numeri per raggiungere il target. Esercizio di matematica mentale nel browser." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://casualkidsgames.netlify.app/games/operatori/" />
<meta property="og:site_name" content="Casual Games" />
<meta name="twitter:card" content="summary" />
<link rel="stylesheet" href="../../styles/base.css" />
<link rel="stylesheet" href="operatori.css" />
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KSS8BN6Q" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <div id="app-header"></div>
  <div id="game-ops" class="game-view">
    <div class="subtitle" id="ops-subtitle"></div>
    <div class="panel">
      <div class="status" id="ops-status"></div>
      <div class="ops-expression" id="ops-expr"></div>
      <div class="ops-keys" id="ops-keys"></div>
      <div class="controls">
        <button id="ops-clear"></button>
        <button id="ops-new"></button>
      </div>
      <div class="three-stats">
        <div class="stat-item wins">
          <div class="label" id="lbl-ops-wins">Vittorie</div>
          <div class="value" id="ops-wins">0</div>
        </div>
        <div class="stat-item losses">
          <div class="label" id="lbl-ops-losses">Saltate</div>
          <div class="value" id="ops-losses">0</div>
        </div>
        <div class="stat-item best">
          <div class="label" id="lbl-ops-best">Record</div>
          <div class="value" id="ops-best">0</div>
        </div>
      </div>
    </div>
    <footer id="ops-footer"></footer>
  </div>
  <div id="app-footer"></div>
  <script type="module">
    import { applyLanguage, currentLang } from '../../shared/i18n.js';
    import { renderHeader } from '../../shared/header.js';
    import { renderFooter } from '../../shared/footer.js';
    import game from './operatori.js';
    renderHeader({ backHref: '../../' });
    renderFooter();
    game.init();
    applyLanguage(currentLang);
  </script>
</body>
</html>
