<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="../../shared/gtm.js"></script>
<title>Mastermind online gratis — Casual Games</title>
<meta name="description" content="Mastermind online: indovina la combinazione di colori. Gioco di logica classico." />
<link rel="canonical" href="https://casualkidsgames.netlify.app/games/mastermind/" />
<meta property="og:title" content="Mastermind online gratis — Casual Games" />
<meta property="og:description" content="Mastermind online: indovina la combinazione di colori. Gioco di logica classico." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://casualkidsgames.netlify.app/games/mastermind/" />
<meta property="og:site_name" content="Casual Games" />
<meta name="twitter:card" content="summary" />
<link rel="stylesheet" href="../../styles/base.css" />
<link rel="stylesheet" href="mastermind.css" />
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KSS8BN6Q" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <div id="app-header"></div>
  <div id="game-mastermind" class="game-view">
    <div class="subtitle" id="mm-subtitle"></div>
    <div class="panel">
      <div class="status" id="mm-status"></div>
      <div class="mm-board" id="mm-board"></div>
      <div class="mm-solution" id="mm-solution" hidden></div>
      <div class="mm-palette" id="mm-palette"></div>
      <div class="controls">
        <button id="mm-check"></button>
        <button id="mm-clear"></button>
        <button id="mm-new"></button>
      </div>
      <div class="three-stats">
        <div class="stat-item wins">
          <div class="label" id="lbl-mm-wins">Vittorie</div>
          <div class="value" id="mm-wins">0</div>
        </div>
        <div class="stat-item losses">
          <div class="label" id="lbl-mm-losses">Sconfitte</div>
          <div class="value" id="mm-losses">0</div>
        </div>
        <div class="stat-item best">
          <div class="label" id="lbl-mm-best">Record</div>
          <div class="value" id="mm-best">–</div>
        </div>
      </div>
    </div>
    <footer id="mm-footer"></footer>
  </div>
  <div id="app-footer"></div>
  <script type="module">
    import { applyLanguage, currentLang } from '../../shared/i18n.js';
    import { renderHeader } from '../../shared/header.js';
    import { renderFooter } from '../../shared/footer.js';
    import game from './mastermind.js';
    renderHeader({ backHref: '../../' });
    renderFooter();
    game.init();
    applyLanguage(currentLang);
  </script>
</body>
</html>
