<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="../../shared/gtm.js"></script>
<title>Tris online gratis — Casual Games</title>
<meta name="description" content="Gioca a Tris (Tic Tac Toe) online contro un'IA imbattibile. Gratis, senza registrazione, nel browser." />
<link rel="canonical" href="https://casualkidsgames.netlify.app/games/tris/" />
<meta property="og:title" content="Tris online gratis — Casual Games" />
<meta property="og:description" content="Gioca a Tris (Tic Tac Toe) online contro un'IA imbattibile. Gratis, senza registrazione, nel browser." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://casualkidsgames.netlify.app/games/tris/" />
<meta property="og:site_name" content="Casual Games" />
<meta name="twitter:card" content="summary" />
<link rel="stylesheet" href="../../styles/base.css" />
<link rel="stylesheet" href="tris.css" />
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KSS8BN6Q" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <div id="app-header"></div>
  <div id="game-tris" class="game-view">
    <div class="subtitle" id="tris-subtitle"></div>
    <div class="panel">
      <div class="controls">
        <button id="btn-human-first" class="active">Inizio io</button>
        <button id="btn-ai-first">Inizia l'IA</button>
        <button id="btn-reset">Nuova partita</button>
      </div>
      <div class="status" id="status">Tocca a te (X)</div>
      <div class="board" id="board">
        <button class="cell" data-i="0"></button>
        <button class="cell" data-i="1"></button>
        <button class="cell" data-i="2"></button>
        <button class="cell" data-i="3"></button>
        <button class="cell" data-i="4"></button>
        <button class="cell" data-i="5"></button>
        <button class="cell" data-i="6"></button>
        <button class="cell" data-i="7"></button>
        <button class="cell" data-i="8"></button>
      </div>
      <div class="scoreboard">
        <div class="score-item you">
          <div class="label" id="lbl-score-you">Tu</div>
          <div class="value" id="score-you">0</div>
        </div>
        <div class="score-item draws">
          <div class="label" id="lbl-score-draws">Patte</div>
          <div class="value" id="score-draws">0</div>
        </div>
        <div class="score-item ai">
          <div class="label" id="lbl-score-ai">IA</div>
          <div class="value" id="score-ai">0</div>
        </div>
      </div>
    </div>
    <footer id="tris-footer"></footer>
  </div>
  <div id="app-footer"></div>
  <script type="module">
    import { applyLanguage, currentLang } from '../../shared/i18n.js';
    import { renderHeader } from '../../shared/header.js';
    import { renderFooter } from '../../shared/footer.js';
    import game from './tris.js';
    renderHeader({ backHref: '../../' });
    renderFooter();
    game.init();
    applyLanguage(currentLang);
  </script>
</body>
</html>
